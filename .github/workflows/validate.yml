name: validate

on:
  push:
    branches: [main]
    paths:
      - "**"
      - ".claude-plugin/**"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "**"
      - ".claude-plugin/**"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate plugin.json and marketplace.json
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! bash hooks-toolkit/scripts/validate-plugin-json.sh "$file"; then
              failed=$((failed + 1))
            fi
          done < <(find . -name "plugin.json" -print0)

          if ! bash hooks-toolkit/scripts/validate-plugin-json.sh .claude-plugin/marketplace.json; then
            failed=$((failed + 1))
          fi

          exit $failed

      - name: Validate SKILL.md frontmatter
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! bash hooks-toolkit/scripts/validate-skill-frontmatter.sh "$file"; then
              failed=$((failed + 1))
            fi
          done < <(find . -name "SKILL.md" -print0)
          exit $failed
